<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <main>
        <div class="item active" style="--bg: #ea3d41">
            <div class="title">Strawberry</div>
            <img src="./img/Morango-refrigerante-foregroundBlur.png" alt="background-strawberry" class="fruit">
            <img src="./img/Morango-refrigerante.png" alt="can-strawberry" class="refri">
        </div>
        <div class="item " style="--bg: #2d5643">
            <div class="title">Avocado</div>
            <img src="./img/Abacate-refrigerante-foregroundBlur.png" alt="background-avocado" class="fruit">
            <img src="./img/Abacate-refrigerante.png" alt="can-avocado" class="refri">
        </div>
        <div class="item " style="--bg: #e7a043">
            <div class="title">Orange</div>
            <img src="./img/Laranja-refrigerante-foregroundBlur.png" alt="background-orange" class="fruit">
            <img src="./img/Laranja-refrigerante.png" alt="can-orange" class="refri">
        </div>

        <div class="arrow">
            <button id="prev"> <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg> </button>
            <button id="next"> <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg> </button>
        </div>
    </main>
    
</body>
<script src="./scripts.js"></script>
</html>
