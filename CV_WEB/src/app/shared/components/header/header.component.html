<header class="relative w-full min-h-screen overflow-hidden">

  <!-- BACKGROUND -->
  <img src="assets/images/Banner.png" class="absolute inset-0 w-full h-full object-cover" />

  <!-- CONTEÚDO CENTRAL -->
  <div class="relative z-10 flex flex-col items-center justify-center text-center min-h-screen px-6">

    <h1 class="text-2xl md:text-3xl font-bold leading-tight text-white mb-6 bg-neutral-800/50 px-4 py-1 rounded-md">
      {{ info.name }}
    </h1>

    <!-- FOTO -->
    <img [src]="info.photo" (error)="onImgError($event)" class="
        w-56 h-56
        md:w-64 md:h-64
        lg:w-72 lg:h-72
        rounded-full
        object-cover object-top
        border-4 border-white
        shadow-2xl
        animate-fadeUp
        z-20
      " />

    <!-- TEXTO -->
    <div class="text-white mt-6 animate-fadeDown z-10">

      <!-- info pessoal -->
      <p class="text-sm text-neutral-200 mt-3 bg-neutral-800/50 px-4 py-1 rounded-md">
        <span *ngIf="info.maritalStatus">
          {{ info.maritalStatus }}
        </span>

        <span *ngIf="age">
          • {{ age }} anos
        </span>

        <span *ngIf="info.address">
          • {{ info.address }}
        </span>
      </p>

      <!-- contatos -->
      <div class="flex flex-col items-center gap-2 mt-6">

        <!-- email -->
        <a [href]="'mailto:' + info.email"
          class="flex items-center gap-2 hover:text-white transition bg-neutral-800/50 px-4 py-1 rounded-md">
          <!-- icon -->
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l9 6 9-6M4 6h16v12H4z" />
          </svg>

          {{ info.email }}
        </a>

        <!-- whatsapp -->
        <a [href]="'https://wa.me/' + info.phone.replace(/\\D/g,'')" target="_blank"
          class="flex items-center gap-2 hover:text-white transition bg-neutral-800/50 px-4 py-1 rounded-md">

          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
            <path
              d="M20.52 3.48A11.94 11.94 0 0012.05 0C5.4 0 .05 5.35.05 12c0 2.12.55 4.19 1.6 6.02L0 24l6.17-1.62A11.94 11.94 0 0012.05 24c6.65 0 12-5.35 12-12z" />
          </svg>

          {{ info.phone }}
        </a>

      </div>

    </div>

  </div>

  <!-- OPÇÕES PROFISSIONAIS -->
  <div class="
  relative
  w-full
  max-w-6xl
  mx-auto
  h-[100vh]
  z-20
  ">

    <div class="absolute top-10 left-10">
      <app-cards titulo="Programador Web"
        descricao="Programador web com formação técnica e experiência acadêmica em Javascript, Angular, React, Python, Java, PHP, SQL, HTML e CSS."
        tipo="programador" (abrir)="abrirCurriculo($event)" (abrirPortfolio)="abrirPortfolio($event)">
      </app-cards>
    </div>

    <div class="absolute bottom-10 right-10">
      <app-cards titulo="Analista de Dados"
        descricao="Analista de Dados com experiência em ETL, modelagem de dados, SQL, Python e Power BI."
        tipo="analista" (abrir)="abrirCurriculo($event)" (abrirPortfolio)="abrirPortfolio($event)">
      </app-cards>
    </div>

  </div>
</header>
