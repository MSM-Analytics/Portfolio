<header class="bg-gradient-to-r from-blue-600 to-blue-800 text-white py-16">
  <div class="container mx-auto px-4 md:px-6">

    <div class="flex flex-col md:flex-row items-center md:items-start gap-8">

      <!-- FOTO -->
      <div class="relative">
        <div class="absolute inset-0 rounded-full blur-xl bg-white/30"></div>

        <img [src]="info.photo" (error)="onImgError($event)" [alt]="info.name"
          class="relative w-36 h-36 md:w-44 md:h-44 rounded-full object-cover border-4 border-white shadow-lg" />
      </div>

      <!-- TEXTO -->
      <div class="flex-1 text-center md:text-left">

        <h1 class="text-4xl md:text-5xl font-bold mb-2">
          {{ info.name }}
        </h1>

        <p class="text-xl md:text-2xl text-blue-100 mb-6">
          {{ info.title }}
        </p>

        <div class="flex flex-wrap gap-4 justify-center md:justify-start text-sm md:text-base">

          <a [href]="'mailto:' + info.email" class="hover:text-blue-200 transition">
            {{ info.email }}
          </a>

          <span>
            {{ info.phone }}
          </span>

          <span>
            {{ info.location }}
          </span>

          <a *ngIf="info.linkedin" [href]="info.linkedin" target="_blank" class="hover:text-blue-200 transition">
            LinkedIn
          </a>

          <a *ngIf="info.github" [href]="info.github" target="_blank" class="hover:text-blue-200 transition">
            GitHub
          </a>

        </div>
      </div>
    </div>
  </div>
</header>
