<section class="py-12 bg-gray-50">
    <!-- SECTION HEADER (PDF-friendly) -->
    <h2
      class="
        text-3xl font-bold text-gray-800 mb-8
        pdf-section-title
      "
    >
      Experiência Profissional
    </h2>

    <div class="space-y-8">

      <div
        *ngFor="let exp of experiences"
        class="
          bg-white rounded-lg shadow-md p-6
          hover:shadow-lg transition
          pdf-item
        "
      >
        <div
          class="flex flex-col md:flex-row md:justify-between md:items-start mb-4"
        >
          <div>
            <h3 class="text-xl font-bold text-gray-800">
              {{ exp.position }}
            </h3>

            <p class="text-lg text-blue-600 font-semibold">
              {{ exp.company }}
            </p>

            <p class="text-gray-600">
              {{ exp.location }}
            </p>
          </div>

          <div class="text-gray-600 mt-2 md:mt-0 md:text-right">
            <span class="font-medium">
              {{ exp.startDate }} - {{ exp.current ? 'Atual' : exp.endDate }}
            </span>
          </div>
        </div>

        <ul class="list-disc list-inside space-y-2 text-gray-700">
          <li *ngFor="let desc of exp.description">
            {{ desc }}
          </li>
        </ul>

      </div>
    </div>
</section>
