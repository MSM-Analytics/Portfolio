<div class="
  h-auto overflow-hidden flex flex-col justify-between gap-1 mt-1 mb-1 w-full
  /* Notebook */
  lg:flex lg:flex-row lg:m-[2%] lg:p-4 lg:mt-8
  ">

  <!-- conteúdo -->
  <div class="
  w-full gap-1
  /* Notebook */
  lg:flex lg:flex-row lg:flex-wrap lg:justify-center lg:gap-4

  ">

    <h2 class="
        font-bold text-white w-full text-center
        /* Mobile */
        sm:text-sm
        md:text-lg md:font-bold md:text-white  md:flex md:flex-col
        /* Notebook */
        lg:text-neutral-950
        "[ngClass]="invertido ? 'md:text-right md:order-3' : 'md:text-start md:order-1'
        ">
      {{ titulo }}
    </h2>

    <p class="
      text-neutral-200 h-auto hidden
      text-sm mt-4 mb-4
      lg:block
      " [ngClass]="invertido ? 'md:order-2' : 'md:order-2'
      ">
      {{ descricao }}
    </p>

    <div class="
    mt-1 mb-1 flex gap-1 justify-center w-full
    /* Mobile */
    /* Notebook */
    lg:gap-4 lg:mt-4 lg:mb-4 
    " [class.order-3]="invertido
    " [ngClass]="invertido ? 'md:justify-end md:order-1' : 'md:justify-start md:order-3'
    ">

      <button class="
      bg-blue-400/70 hover:bg-blue-400/50 text-white rounded-lg transition 
      w-[80%] tracking-wide text-xs py-1 px-2
        /* Mobile */
        md:py-2 md:px-6 md:text-md md:w-[45%]
        " (click)="abrirCurriculo()
        ">
        Currículum
      </button>

      <button class="bg-emerald-400/70 hover:bg-emerald-400/50 text-white rounded-lg transition
       w-[80%] tracking-wide text-xs py-1 px-2
        /* Mobile */
        md:text-md md:py-2 md:px-6 md:w-[45%]
        " (click)="abrirPortfolioClick()
        ">
        Portfólio
      </button>

    </div>

  </div>

</div>
