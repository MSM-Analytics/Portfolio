<div class="
  h-auto
  overflow-hidden
  flex 
  flex-col
  justify-between
  items-center
  gap-2
  mt-1
  mb-1
  w-full
  
  md:flex
  md:flex-row
  
  lg:m-[2%]
  lg:p-4
  lg:mt-8
  ">

  <!-- conteúdo -->
  <div class="
  w-full
  gap-2
  items-center

  lg:flex
  lg:flex-row
  lg:flex-wrap
  lg:gap-4
  "[ngClass]="invertido ? 'lg:justify-end' : 'lg:justify-start'

  ">

    <h2 class="
        font-bold text-white w-full text-center
        /* Mobile */
        sm:text-sm
        /* Tablet */
        md:text-lg md:font-bold md:text-white  md:flex md:flex-col
        /* Notebook */
        lg:text-neutral-950
        "[ngClass]="invertido ? 'lg:text-right md:order-3' : 'lg:text-start md:order-1'
        ">
      {{ titulo }}
    </h2>

    <p class="
      text-neutral-200 h-auto hidden
      text-sm mt-4 mb-4
      lg:block
      " [ngClass]="invertido ? 'text-end order-2' : 'text-start order-2'
      ">
      {{ descricao }}
    </p>

    <div class="
    mt-1 mb-1 flex gap-1 justify-center w-full
    /* Notebook */
    lg:gap-4 lg:mt-4 lg:mb-4
    " [ngClass]="invertido ? 'lg:justify-end lg:order-1' : 'lg:justify-start lg:order-3'
    ">

      <button class="
      bg-blue-400/70
      hover:bg-blue-400/50
      text-white rounded-lg
      transition
      w-[45%]
      max-w-[180px]
      tracking-wide
      text-xs
      py-2
      px-2

      md:py-2
      md:px-6
      md:text-md
      md:max-w-[250px]
        
      lg:w-[50%]
      " (click)="abrirCurriculo()
      ">
        Currículum
      </button>

      <button class="
      bg-emerald-400/70
      hover:bg-emerald-400/50
      text-white
      rounded-lg
      transition
      w-[45%]
      max-w-[180px]
      tracking-wide
      text-xs
      py-1
      px-2
      
      md:text-md
      md:py-2
      md:px-6
      md:max-w-[250px]

      lg:w-[50%]

      " (click)="abrirPortfolioClick()
      ">
        Portfólio
      </button>

    </div>

  </div>

</div>
