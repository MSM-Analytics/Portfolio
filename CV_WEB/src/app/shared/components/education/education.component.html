<section class="py-12 bg-white">
    <!-- SECTION HEADER (PDF-friendly) -->
    <h2
      class="
        text-3xl font-bold text-gray-800 mb-8
        pdf-section-title
      "
    >
      Formação Acadêmica
    </h2>

    <div class="space-y-6">

      <div
        *ngFor="let edu of education"
        class="
          bg-gray-50 rounded-lg shadow p-6
          pdf-item
        "
      >
        <div
          class="flex flex-col md:flex-row md:justify-between md:items-start mb-3"
        >
          <div>
            <h3 class="text-xl font-bold text-gray-800">
              {{ edu.degree }}
            </h3>

            <p class="text-lg text-blue-600 font-semibold">
              {{ edu.institution }}
            </p>

            <p class="text-gray-600">
              {{ edu.location }}
            </p>
          </div>

          <div class="text-gray-600 mt-2 md:mt-0 md:text-right">
            <span class="font-medium">
              {{ edu.startDate }} - {{ edu.endDate }}
            </span>
          </div>
        </div>

        <ul class="list-disc list-inside space-y-2 text-gray-700 mt-3">
          <li *ngFor="let item of edu.description">
            {{ item }}
          </li>
        </ul>

      </div>
    </div>
</section>
